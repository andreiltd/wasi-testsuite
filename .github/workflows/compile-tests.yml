name: Compile tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
    paths:
      - 'tests/**'
      - 'toolchains/**'
      - 'third-party/**'
      - '.buckconfig'
      - '.github/workflows/compile-tests.yml'

jobs:
  check_formatting:
    name: Check source formatting
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install Rust toolchains
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          target: wasm32-wasip2
          components: rustfmt

      - name: Install stable Rust for wasip1
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip1
          components: rustfmt

      - name: Check Rust formatting
        run: |
          cargo fmt --manifest-path ./tests/rust/wasm32-wasip3/Cargo.toml --check
          cargo fmt --manifest-path ./tests/rust/wasm32-wasip1/Cargo.toml --check

  build_and_test:
    name: Build and test with Buck2
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install dotslash
        uses: taiki-e/install-action@v2
        with:
          tool: dotslash

      - name: Install Rust wasm targets
        run: |
          rustup target add wasm32-wasip1
          rustup target add wasm32-wasip2

      - name: Run tests against all runtimes
        run: dotslash ./buck2 test //tests/...

      - name: Check C formatting
        if: matrix.os == 'ubuntu-latest'
        run: |
          CLANG_FORMAT=$(find buck-out -name clang-format -type f | head -1)
          find tests/c/src -regex '.*\.\(c\|h\)' -print0 | xargs -0 -n1 "$CLANG_FORMAT" --style=file --dry-run -Werror

      - name: Install wasmtime (for dist test)
        if: matrix.os == 'ubuntu-latest'
        uses: bytecodealliance/actions/wasmtime/setup@v1
        with:
          version: "v43.0.0"

      - name: Build and test dist archive
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true  # TODO: fix cli-env (argv[0] mismatch) and http-service (race condition)
        run: |
          dotslash ./buck2 build //tests:dist
          DIST=$(dotslash ./buck2 build //tests:dist --show-output 2>&1 | grep "root//tests:dist" | awk '{print $2}')
          cp "$DIST" wasi-testsuite.tar.gz
          pip install requests
          mkdir -p /tmp/dist-test && cd /tmp/dist-test
          tar xzf $GITHUB_WORKSPACE/wasi-testsuite.tar.gz
          $GITHUB_WORKSPACE/run-tests wasi-testsuite -r $GITHUB_WORKSPACE/adapters/wasmtime.py --verbose

      - name: Upload dist artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: wasi-testsuite-dist
          path: wasi-testsuite.tar.gz

  publish_release:
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs: [build_and_test]
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install dotslash
        uses: taiki-e/install-action@v2
        with:
          tool: dotslash

      - name: Install Rust wasm targets
        run: |
          rustup target add wasm32-wasip1
          rustup target add wasm32-wasip2

      - name: Build distribution archive
        run: |
          dotslash ./buck2 build //tests:dist
          DIST_PATH=$(dotslash ./buck2 build //tests:dist --show-output 2>&1 | grep "root//tests:dist" | awk '{print $2}')
          cp "$DIST_PATH" wasi-testsuite.tar.gz

      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest test suite
          body: |
            Auto-generated distribution of the WASI test suite.
            Built from commit ${{ github.sha }}.

            Contains prebuilt `.component.wasm` binaries, test configs,
            fixture directories, and `manifest.json`.

            See [integration guide](https://github.com/WebAssembly/wasi-testsuite/blob/main/doc/integration.md) for usage.
          files: wasi-testsuite.tar.gz
          prerelease: true
          make_latest: true
