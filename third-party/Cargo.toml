[workspace]

[package]
name = "rust-third-party"
version = "0.0.0"
publish = false
edition = "2021"

# Dummy target to keep Cargo happy
[[bin]]
name = "fake"
path = "/dev/null"

[dependencies]
wasi = "0.11.0"
libc = "0.2.65"
once_cell = "1.12"
wit-bindgen = { git = "https://github.com/bytecodealliance/wit-bindgen.git", rev = "85d10eb33a54191220d34215bbcc4e29cb959884", features = ["async-spawn"] }
futures = "=0.3.31"
futures-core = "=0.3.31"
futures-task = "=0.3.31"
futures-channel = "=0.3.31"
futures-executor = "=0.3.31"
futures-io = "=0.3.31"
futures-sink = "=0.3.31"
futures-util = "=0.3.31"
futures-macro = "=0.3.31"
